services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: sublead
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sublead
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sublead"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://sublead:${POSTGRES_PASSWORD}@postgres:5432/sublead
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      APP_URL: ${APP_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PYTHON_SERVICE_URL: http://python:3002
      FREE_LEAD_LIMIT: ${FREE_LEAD_LIMIT:-50}

  python:
    build: ./apps/python
    restart: unless-stopped
    ports:
      - "${PYTHON_PORT:-3002}:3002"
    environment:
      APP_URL: ${APP_URL}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-sublead/1.0}

volumes:
  pgdata:
